name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Fix Gradle wrapper version
        run: |
          cd android
          sed -i 's|gradle-.*-all.zip|gradle-8.2.1-all.zip|g' gradle/wrapper/gradle-wrapper.properties
          sed -i 's|gradle-.*-bin.zip|gradle-8.2.1-bin.zip|g' gradle/wrapper/gradle-wrapper.properties

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --warning-mode=all

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: notemate-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
