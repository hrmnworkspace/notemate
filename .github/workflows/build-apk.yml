name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create missing cordova variables file
        run: |
          mkdir -p android/capacitor-cordova-android-plugins
          echo 'ext { cordovaAndroidVersion = "10.1.1" }' > android/capacitor-cordova-android-plugins/cordova.variables.gradle

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Fix Gradle wrapper version
        run: |
          cd android
          sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.7-all.zip|g' gradle/wrapper/gradle-wrapper.properties

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: notemate-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
